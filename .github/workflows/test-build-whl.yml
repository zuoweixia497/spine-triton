name: Build Libraries CI

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      python-versions: ${{ steps.read-versions.outputs.versions }}
    steps:
      - uses: actions/checkout@v4
      - name: Read Python versions from variables.env
        id: read-versions
        run: |
          source .github/variables.env
          echo "versions=$PYTHON_VERSIONS" >> $GITHUB_OUTPUT

  build-libs:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(needs.setup.outputs.python-versions) }}
    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set environment variables
        run: |
          cat .github/variables.env >> $GITHUB_ENV

      - name: Setup System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang lld

      - name: Free Disk Space & Setup Swap
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ninja cmake wheel pybind11 setuptools

      - name: Cache RV toolchain
        id: cache-rv-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          key: rv-toolchain-${{ hashFiles('.github/variables.env') }}-zlib-1.3.1

      - name: Download and extract RV toolchain
        if: steps.cache-rv-toolchain.outputs.cache-hit != 'true'
        run: |
          curl -k -L -o spacemit-toolchain.tar.xz ${{ env.RISCV_TOOLCHAIN_URL }}
          mkdir -p toolchain
          tar -xf spacemit-toolchain.tar.xz -C toolchain --strip-components=1
          rm spacemit-toolchain.tar.xz
          rm -rf toolchain/sysroot/lib64/cmake/*

      - name: Set RV toolchain environment variables
        run: |
          echo "RISCV_ROOT_PATH=$(pwd)/toolchain" >> $GITHUB_ENV

      - name: Add zlib(rv) to RV toolchain
        if: steps.cache-rv-toolchain.outputs.cache-hit != 'true'
        run: |
          chmod +x .github/scripts/build_rv_zlib.sh
          ./.github/scripts/build_rv_zlib.sh

      - name: Cache SPEIR
        id: cache-speir
        uses: actions/cache@v4
        with:
          path: speir_installed
          key: speir-${{ hashFiles('.github/variables.env') }}

      - name: Download and extract SPEIR
        if: steps.cache-speir.outputs.cache-hit != 'true'
        run: |
          curl -k -L -o speir.tar.gz ${{ env.SPEIR_URL }}
          mkdir -p speir_installed
          tar -xf speir.tar.gz -C speir_installed --strip-components=6
          rm speir.tar.gz

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: llvm_installed
          key: llvm-${{ hashFiles('.github/variables.env') }}

      - name: Download and extract LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          curl -k -L -o llvm.tar.gz ${{ env.LLVM_URL }}
          mkdir -p llvm_installed
          tar -xf llvm.tar.gz -C llvm_installed --strip-components=1
          rm llvm.tar.gz

      - name: Build and install Spine Triton plugin
        env:
          MAX_JOBS: 2
          TRITON_PARALLEL_LINK_JOBS: 1
        run: |
          chmod +x scripts/build_whl.sh
          ./scripts/build_whl.sh llvm_installed riscv64 speir_installed

      - name: Upload wheel package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: spine-triton-whl-py${{ matrix.python-version }}
          path: build-wheel-riscv64/*.whl
          retention-days: 30

      - name: Verify Wheel Architecture (RISC-V)
        run: |
          WHEEL_FILE=$(find . -name "*.whl" -type f | head -n 1)

          if [ -z "$WHEEL_FILE" ]; then
            echo "Error: no .whl file found"
            ls -la build-wheel-riscv64/ 2>/dev/null || echo "build-wheel-riscv64 does not exist"
            exit 1
          fi

          echo "Found wheel: $WHEEL_FILE"
          mkdir -p /tmp/wheel_check
          unzip -q "$WHEEL_FILE" -d /tmp/wheel_check

          SO_FILES=$(find /tmp/wheel_check -name "*.so" -type f)

          if [ -z "$SO_FILES" ]; then
            echo "Warning: no .so files found in wheel (pure Python package?)"
            exit 0
          fi

          echo "Found $(echo "$SO_FILES" | wc -l) .so file(s)"

          FAILED=0
          for file in $SO_FILES; do
            arch_info=$(file "$file")
            echo "$file"
            echo "  $arch_info"

            # Must not be x86-64
            if echo "$arch_info" | grep -qi "x86-64"; then
              echo "  Error: x86-64 binary detected"
              FAILED=1
            fi

            # Must be RISC-V
            if ! echo "$arch_info" | grep -qi "RISC-V"; then
              echo "  Error: not a RISC-V binary"
              FAILED=1
            fi
          done

          if [ $FAILED -eq 1 ]; then
            echo "Architecture check failed"
            exit 1
          fi

          echo "Architecture check passed: all shared libraries are RISC-V"
